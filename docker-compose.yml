services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: qa_integration_lab
      POSTGRES_USER: qa_user
      POSTGRES_PASSWORD: qa_pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qa_user -d qa_integration_lab"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://qa_user:qa_pass@db:5432/qa_integration_lab
      PORT: 3000
    ports:
      - "3000:3000"
